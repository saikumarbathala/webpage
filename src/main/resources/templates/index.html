<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Spring Boot Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 56px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 480px;
        }
        .badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 24px;
        }
        h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 12px; }
        p  { font-size: 16px; color: #555; margin-bottom: 8px; }
        .version { font-size: 12px; color: #aaa; margin-top: 24px; }
        .dot { width: 10px; height: 10px; background: #4caf50;
               border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge"><span class="dot"></span>Live on EC2</div>
        <h1>🚀 Deployed Successfully!</h1>
        <p th:text="${message}">Loading...</p>
        <p>Jenkins CI/CD pipeline తో automatically deploy అయింది.</p>
        <div class="version">Version: <span th:text="${version}">-</span></div>
    </div>
</body>
</html>
